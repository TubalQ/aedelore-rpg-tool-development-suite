services:
  aedelore-dev-db:
    image: postgres:16-alpine
    container_name: aedelore-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - aedelore-dev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  aedelore-dev-web:
    image: nginx:alpine
    container_name: aedelore-dev-web
    restart: unless-stopped
    ports:
      - "9030:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - aedelore-dev-api

  aedelore-dev-api:
    build: ./api
    container_name: aedelore-dev-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@aedelore-dev-db:5432/${POSTGRES_DB}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: http://localhost:9030
    volumes:
      - ./api/data:/app/data
    expose:
      - "3000"
    depends_on:
      aedelore-dev-db:
        condition: service_healthy

  # Build service for frontend JavaScript minification
  aedelore-dev-build:
    build:
      context: ./html
      dockerfile: Dockerfile.build
    container_name: aedelore-dev-build
    volumes:
      - ./html:/app
    profiles:
      - build  # Only run when explicitly requested

volumes:
  aedelore-dev-pgdata:
