user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Security: Get real client IP from reverse proxy
    # Set this to your reverse proxy's IP address
    set_real_ip_from 172.18.0.1;  # Docker network default - change to your proxy IP
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Security: Hide nginx version
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Security: Request size limits
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # Security: Timeouts
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # Security: Rate limiting zones (uses real client IP from Traefik)
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # HTTP/2 requires HTTPS - this config supports both HTTP and HTTPS
    server {
        listen 80;
        listen 443 ssl http2;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # SSL configuration (self-signed for development)
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security: Connection limit per IP
        limit_conn conn_limit 20;

        # Security: Restrict HTTP methods globally
        if ($request_method !~ ^(GET|POST|PUT|DELETE|HEAD|OPTIONS)$) {
            return 405;
        }

        # Proxy API requests to backend
        location /api {
            # Security: Rate limit API requests
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://aedelore-dev-api:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Security: Proxy timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Redirect .html extension to clean URLs
        location ~ ^(.+)\.html$ {
            return 301 $1;
        }

        # Main location - handle clean URLs and static files
        location / {
            # Security: Rate limit general requests
            limit_req zone=general burst=30 nodelay;

            # Try: exact file, directory with index.html, file with .html extension, then 404
            try_files $uri $uri/ $uri.html =404;
        }

        # Root path - serve index.html
        location = / {
            try_files /index.html =404;
        }

        # No cache for APK files
        location ~* \.apk$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Cache static assets (CDN-ready)
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            etag on;
        }

        # Cache JS/CSS with versioned names (CDN-ready)
        location ~* \.(css|js)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            etag on;

            # HTTP/2 Server Push hints for critical assets
            add_header Link "</css/styles.css>; rel=preload; as=style" always;
            add_header Link "</js/main.js>; rel=preload; as=script" always;
        }

        # Data files (shorter cache for updates)
        location ~* ^/data/.*\.js$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            add_header Vary "Accept-Encoding";
            etag on;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
}
